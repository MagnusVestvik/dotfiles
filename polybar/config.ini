[colors]
text = #f4f7fb
text-dim = #d2dae4
glass = #2bffffff
glass-strong = #3dffffff
glass-hover = #4dffffff
stroke = #5cffffff
stroke-soft = #2effffff
danger = #47ff6e6e
ok = #3d80e8b0
background = #00000000

[bar/main]
width = 100%
height = 52
radius = 0
fixed-center = true
background = ${colors.background}
foreground = ${colors.text}
line-size = 0
border-size = 0
padding-left = 1
padding-right = 1
module-margin = 1
separator =
wm-restack = generic
override-redirect = false
enable-ipc = true

font-0 = SF Pro Display:size=12;3
font-1 = SF Pro Text:size=12;3
font-2 = Font Awesome 6 Free:style=Solid:size=12;3
font-3 = Symbols Nerd Font Mono:size=12;2

modules-left = xworkspaces cpu gpu memory temperature
modules-center = mpd date
modules-right = pulseaudio network powermenu tray

cursor-click = pointer
cursor-scroll = ns-resize

[module/pill-base]
type = custom/text
content =
format-padding = 2
format-background = ${colors.glass}
format-foreground = ${colors.text}

[module/xworkspaces]
type = internal/xworkspaces
pin-workspaces = false
enable-click = true
enable-scroll = false

label-active = %icon%
label-active-background = ${colors.glass-strong}
label-active-foreground = ${colors.text}
label-active-padding = 2

label-occupied = %icon%
label-occupied-background = ${colors.glass}
label-occupied-foreground = ${colors.text-dim}
label-occupied-padding = 2

label-urgent = %icon%
label-urgent-background = ${colors.danger}
label-urgent-foreground = ${colors.text}
label-urgent-padding = 2

label-empty = %icon%
label-empty-background = ${colors.glass}
label-empty-foreground = ${colors.text-dim}
label-empty-padding = 2

icon-0 = 1:\uf120;1
icon-1 = 2:\uf269;2
icon-2 = 3:\uf075;3
icon-3 = 4:\uf2bc;4
icon-4 = 5:\uf07c;5
icon-5 = 6;6
icon-6 = 7;7
icon-7 = 8;8
icon-8 = 9;9
icon-9 = 10;10
icon-10 = 11;11
icon-11 = 12;12
icon-12 = 13;13
icon-13 = 14;14
icon-14 = 15;15
icon-15 = 16;16
icon-16 = 17;17
icon-17 = 18;18
icon-18 = 19;19

[module/cpu]
type = internal/cpu
interval = 2
format = <label>
format-background = ${colors.glass}
format-padding = 2
label = %percentage%% 

[module/gpu]
type = custom/script
exec = ~/.config/polybar/scripts/gpu-usage.sh
interval = 1
format-background = ${colors.glass}
format-padding = 2
label = %output%% 󰢮

[module/memory]
type = internal/memory
interval = 2
format = <label>
format-background = ${colors.glass}
format-padding = 2
label = %percentage_used%% 🧠

[module/temperature]
type = internal/temperature
interval = 2
warn-temperature = 80
format = <label>
format-background = ${colors.glass}
format-padding = 2
format-warn = <label-warn>
format-warn-background = ${colors.danger}
format-warn-padding = 2
label = %temperature-c%°C %icon%
label-warn = %temperature-c%°C %icon%
ramp-0 = 
ramp-1 = 
ramp-2 = 

[module/mpd]
type = internal/mpd
host = 127.0.0.1
port = 6600
interval = 2
format-online = <label-song>
format-online-background = ${colors.glass}
format-online-padding = 2
format-offline = <label-offline>
format-offline-background = ${colors.danger}
format-offline-padding = 2
label-song-maxlen = 80
label-song = %artist% - %title% 
label-offline = Disconnected 

[module/date]
type = internal/date
interval = 1
date = %H:%M | %d Of %B | Week %W
date-alt = %A, %B %d, %Y (%R)
label = %date% 🕛
label-alt = %date% 
format = <label>
format-background = ${colors.glass}
format-padding = 2

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = true
interval = 2
format-volume = <label-volume>
format-volume-background = ${colors.glass}
format-volume-padding = 2
label-volume = %percentage%% %icon%
label-muted = 
label-muted-background = ${colors.danger}
label-muted-padding = 2
click-left = pavucontrol
ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 

[module/network]
type = internal/network
interface-type = wireless
interval = 3
accumulate-stats = true
unknown-as-up = true
format-connected = <label-connected>
format-connected-background = ${colors.glass}
format-connected-padding = 2
label-connected = %essid% (%signal%%) 
format-disconnected = <label-disconnected>
format-disconnected-background = ${colors.danger}
format-disconnected-padding = 2
label-disconnected = Disconnected ⚠

[module/powermenu]
type = custom/menu
expand-right = true
format = <label-toggle>
format-background = ${colors.glass}
format-padding = 2
label-toggle = ⏻
label-close = cancel
label-close-foreground = ${colors.text-dim}

menu-0-0 = logout
menu-0-0-exec = pkill xmonad
menu-0-1 = reboot
menu-0-1-exec = systemctl reboot
menu-0-2 = shutdown
menu-0-2-exec = systemctl poweroff

[module/tray]
type = internal/tray
format-margin = 6px
tray-size = 62%
tray-spacing = 10px

[settings]
screenchange-reload = true
pseudo-transparency = true
